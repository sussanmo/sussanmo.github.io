<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CV preview for Suad Mohamed." />
    <title>CV Preview | Suad Mohamed</title>
    <link rel="icon" type="image/png" href="photos/babypic.png" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        margin: 0;
        background: #f6f1e7;
        color: #2f2923;
        font-family: Manrope, Arial, sans-serif;
      }

      .cv-wrap {
        width: min(1100px, 94%);
        margin: 1rem auto;
      }

      .cv-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.8rem;
        margin-bottom: 0.75rem;
      }

      .cv-toolbar a {
        color: #355f72;
        font-weight: 700;
      }

      .cv-frame {
        width: 100%;
        height: calc(100vh - 4.5rem);
        border: 1px solid #d8cbb7;
        border-radius: 12px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="cv-wrap">
      <div class="cv-toolbar">
        <h1>CV Preview</h1>
        <a href="cv/Suad_Mohamed_CV.pdf" target="_blank" rel="noopener">Open PDF in new tab</a>
      </div>
      <object class="cv-frame" data="cv/Suad_Mohamed_CV.pdf" type="application/pdf">
        <p>
          PDF preview unavailable. Add your file at <strong>cv/Suad_Mohamed_CV.pdf</strong>
          and refresh this page.
        </p>
      </object>
    </main>
  </body>
</html>
